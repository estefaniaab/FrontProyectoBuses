<div class="header bg-gradient-danger py-7 py-lg-8">
  <div class="container">
    <div class="header-body text-center mb-7">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-6">
          <h1 class="text-white">Recuperar contraseña</h1>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container mt--8 pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
      <div class="card bg-secondary shadow border-0">
        <div class="card-body px-lg-5 py-lg-5">
          <div class="text-center text-muted mb-4">
            <small>Ingresa tu email para recuperar tu contraseña</small>
          </div>

          <div class="form-group mb-3">
            <div class="input-group input-group-alternative">
              <div class="input-group-prepend">
                <span class="input-group-text">
                  <i class="ni ni-email-83"></i>
                </span>
              </div>
              <input class="form-control" placeholder="Email"
                     type="email" [(ngModel)]="email">
            </div>
          </div>

          <!-- ✅ reCAPTCHA -->
          <div class="text-center mb-3">
            <re-captcha
              (resolved)="onRecaptchaResolved($event)"
              [siteKey]="siteKey">
            </re-captcha>
          </div>

          <div class="text-center">
            <button class="btn btn-primary my-4" (click)="submit()">
              Enviar instrucciones
            </button>
          </div>

          <div class="text-center">
            <a routerLink="/login" class="text-light">
              <small>Volver al login</small>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
