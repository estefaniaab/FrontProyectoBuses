<div class="header bg-gradient-danger pb-8 pt-5 pt-md-8">
</div>
<!-- Page content -->
<div class="container-fluid mt--7">
  <!-- Table -->
  <div class="row">
    <div class="col">
      <div class="card shadow">
        <div class="card-header bg-transparent">
          <h3 class="mb-0" *ngIf="mode==1">Detalle</h3>
          <h3 class="mb-0" *ngIf="mode==2">Crear</h3>
          <h3 class="mb-0" *ngIf="mode==3">Actualizar</h3>
        </div>
        <div class="card-body">
          <form class="form" [formGroup]="theFormGroup">
            <div class="card-body container">
              <br>
              <div class="row">
                <div class="col-3">Usuario</div>
                <div class="col-9">
                  <input
                    type="text"
                    class="form-control"
                    [(ngModel)]="searchText"
                    [ngModelOptions]="{standalone: true}"
                    (focus)="onUserInputFocus()"
                    (input)="filterUsers()"
                    (blur)="hideUserOptions()"
                    [readonly]="mode !== 2"
                    placeholder="Buscar por nombre o email">

                  <div class="list-group mt-2" *ngIf="mode==2 && showUserOptions">
                    <button
                      type="button"
                      class="list-group-item list-group-item-action"
                      *ngFor="let user of filteredUsers"
                      (click)="selectUser(user)">
                      {{ user.name }} - {{ user.email }}
                    </button>

                    <div class="list-group-item text-muted" *ngIf="filteredUsers.length === 0">
                      No se encontraron usuarios.
                    </div>
                  </div>

                  <input type="hidden" formControlName="userId">

                  <div *ngIf="getTheFormGroup['userId']?.errors && (getTheFormGroup['userId']?.dirty || getTheFormGroup['userId']?.touched || trySend)">
                    <strong *ngIf="getTheFormGroup['userId']?.errors?.['required']" class="msnError">
                      Requerido
                    </strong>
                  </div>
                </div>
              </div>
              <br>
              <div class="row">
                <div class="col-3">Roles</div>
                <div class="col-9">
                  <div *ngFor="let role of roles" class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      [checked]="isChecked(role.id)"
                      (change)="onRoleChange(role.id, $event)"
                      [disabled]="mode==1">
                    <label class="form-check-label">
                      {{ role.name }}
                    </label>
                  </div>
                </div>
              </div>
              <br>
              <div class="row">
                <div class="col-3"></div>
                <div class="col-9">
                  <button type="button" class="btn btn-primary btn-block" (click)="back()">Regresar</button>
                  <button type="button" class="btn btn-success btn-block" (click)="create()"
                          *ngIf="mode==2">Crear</button>
                  <button type="button" class="btn btn-warning btn-block" (click)="update()"
                          *ngIf="mode==3">Actualizar</button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
