<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-body p-5">
          <h4 class="mb-3">Email requerido</h4>
          <p class="text-muted">
            Tu email de GitHub es privado. Por favor ingresa
            un email alternativo para completar el registro.
          </p>
          <div class="form-group">
            <input type="email" class="form-control"
                   [(ngModel)]="email"
                   placeholder="Email alternativo">
          </div>
          <button class="btn btn-primary btn-block mt-3"
                  (click)="submitEmail()">
            Completar registro
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
